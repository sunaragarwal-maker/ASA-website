<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // GitHub Pages serves this file for any unknown path (since it's a
      // static host with no server-side rewrite rules). It re-encodes the
      // real path as a query string and redirects to the app shell, which
      // decodes it back on load (see the inline script in index.html) so
      // React Router ends up on the correct route. Standard pattern:
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // keeps "/ASA-website"
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
