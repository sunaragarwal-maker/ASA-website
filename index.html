    <script type="text/javascript">
      // Decode the path GitHub Pages' 404.html encoded as a query string,
      // and rewrite it back to a real path before React Router mounts.
      // Pairs with public/404.html. https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
